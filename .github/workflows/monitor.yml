name: Monitor Tenis LBS

on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

# IMPORTANTE: Permiso para que el bot pueda guardar el archivo .txt en el repo
permissions:
  contents: write

jobs:
  check-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Ejecutar bot de Playwright
        run: python check_tenis.py

      - name: Guardar estado para la próxima ejecución
        run: |
          git config --global user.name "Bot Tenis"
          git config --global user.email "bot@tenis.com"
          git add conteo_tenis.txt
          # Este comando hace commit SOLO si el archivo cambió. Si no cambió, no da error.
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 Bot actualizó conteo de talleres" && git push)
